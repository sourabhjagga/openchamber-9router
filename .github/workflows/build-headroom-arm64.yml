name: Build Headroom ARM64 → Docker Hub

# Trigger manually from GitHub Actions UI (Actions tab → this workflow → Run workflow)
on:
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build headroom on native ARM64 and push to Docker Hub
    runs-on: ubuntu-24.04-arm   # GitHub native ARM64 runner — no QEMU needed
    timeout-minutes: 60

    steps:
      - name: Check out headroom source at latest stable release
        uses: actions/checkout@v4
        with:
          repository: headroomlabs-ai/headroom
          ref: v0.27.0           # Pin to latest stable release
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: sourabhjagga
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push headroom:latest (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: docker.io/sourabhjagga/headroom:latest
          build-args: |
            TARGETPLATFORM=linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
