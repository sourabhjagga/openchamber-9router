version: '3.8'

services:
  9router:
    image: decolua/9router:latest
    pull_policy: always          # always pull latest on redeploy
    container_name: 9router
    restart: unless-stopped
    ports:
      - "8085:20128"             # 8085 external -> 20128 internal
    volumes:
      - 9router-data:/app/data   # persists 9router config across redeploys
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data

  openchamber:
    build:
      context: .
      dockerfile: openchamber.Dockerfile
      args:
        # DO NOT change CACHE_BUST_STATIC unless you want to deliberately wipe
        # all openchamber data and start fresh (then increment + delete volumes).
        CACHE_BUST_STATIC: "1"
        # CACHE_BUST_DATE ensures every Coolify redeploy clones the latest
        # openchamber source automatically - no manual changes needed.
        CACHE_BUST_DATE: ${CACHE_BUST_DATE:-default}
    container_name: openchamber
    restart: unless-stopped
    ports:
      - "3051:3000"              # 3051 external -> 3000 internal
    volumes:
      - openchamber-config:/home/openchamber/.config/openchamber
      - openchamber-share:/home/openchamber/.local/share/opencode
      - openchamber-state:/home/openchamber/.local/state/opencode
      - openchamber-opencode-config:/home/openchamber/.config/opencode
      - openchamber-ssh:/home/openchamber/.ssh
      - openchamber-workspaces:/home/openchamber/workspaces
    environment:
      - NODE_ENV=production
      - N9ROUTER_URL=http://9router:20128
      - OPENCHAMBER_HOST=0.0.0.0

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    pull_policy: always          # always pull latest on redeploy
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3052:8080"              # 3052 external -> 8080 internal
    volumes:
      - open-webui-data:/app/backend/data  # persists Open WebUI config & chats
    environment:
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-changeme}

volumes:
  9router-data:
  openchamber-config:
  openchamber-share:
  openchamber-state:
  openchamber-opencode-config:
  openchamber-ssh:
  openchamber-workspaces:
  open-webui-data:
