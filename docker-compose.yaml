version: '3.8'

services:
  9router:
    image: decolua/9router:latest
    pull_policy: always          # always pull latest on redeploy
    container_name: 9router
    restart: unless-stopped
    ports:
      - "8085:20128"             # 8085 external -> 20128 internal
    volumes:
      - 9router-data:/app/data   # persists 9router config across redeploys
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data

  openchamber:
    build:
      context: .
      dockerfile: openchamber.Dockerfile
      args:
        # Increment CACHE_BUST by 1 to force a full rebuild + wipe openchamber
        # state on the next Coolify redeploy. Current value = 1 (fresh start).
        CACHE_BUST: "1"
    container_name: openchamber
    restart: unless-stopped
    ports:
      - "3051:3000"              # 3051 external -> 3000 internal
    # NO named volumes - all state is ephemeral.
    # Every redeploy starts openchamber completely fresh (no chats, no config).
    environment:
      - NODE_ENV=production
      - N9ROUTER_URL=http://9router:20128
      - OPENCHAMBER_HOST=0.0.0.0

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    pull_policy: always          # always pull latest on redeploy
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3052:8080"              # 3052 external -> 8080 internal
    volumes:
      - open-webui-data:/app/backend/data  # persists Open WebUI config & chats
    environment:
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-changeme}

volumes:
  9router-data:      # persists 9router config
  open-webui-data:   # persists Open WebUI config and chat history
  # openchamber has NO named volumes - intentionally ephemeral
