version: '3.8'

services:
  9router:
    image: decolua/9router:latest
    container_name: 9router
    restart: unless-stopped
    ports:
      - "8085:20128" # Mapping to available port 8085 (20128 internal)
    volumes:
      - 9router-data:/app/data
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data

  openchamber:
    image: ghcr.io/openchamber/openchamber:latest
    container_name: openchamber
    restart: unless-stopped
    ports:
      - "3051:3000" # Mapping to available port 3051 (3000 internal)
    volumes:
      - openchamber-data:/app/data
    environment:
      - NODE_ENV=production
      - N9ROUTER_URL=http://9router:20128

volumes:
  9router-data:
  openchamber-data:
