version: '3.8'

# =============================================================================
# SERVICES
# Each service uses pull_policy: always so updates are applied on redeploy.
# Named volumes ensure all config, chats, and projects survive every redeploy.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # 9router — AI router/proxy
  # Config persists via: 9router-data
  # ---------------------------------------------------------------------------
  9router:
    image: decolua/9router:latest
    pull_policy: always
    container_name: 9router
    restart: unless-stopped
    ports:
      - "8085:20128"
    volumes:
      - 9router-data:/app/data
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data

  # ---------------------------------------------------------------------------
  # Open WebUI — Chat UI for LLMs
  # Config + chats persist via: open-webui-data
  # ---------------------------------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    pull_policy: always
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3052:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-changeme}

  # ---------------------------------------------------------------------------
  # OpenChamber — AI coding assistant (web UI)
  # Config + chats + workspaces persist via named volumes below
  # ---------------------------------------------------------------------------
  openchamber:
    build:
      context: .
      dockerfile: openchamber.Dockerfile
      args:
        CACHE_BUST_STATIC: "2"
    container_name: openchamber
    restart: unless-stopped
    ports:
      - "3051:3000"
    entrypoint:
      - sh
      - -c
      - |
        rm -f /home/openchamber/.config/openchamber/run/openchamber-*.pid
        exec sh /home/openchamber/openchamber-entrypoint.sh
    volumes:
      - openchamber-config:/home/openchamber/.config/openchamber
      - openchamber-share:/home/openchamber/.local/share/opencode
      - openchamber-state:/home/openchamber/.local/state/opencode
      - openchamber-opencode-config:/home/openchamber/.config/opencode
      - openchamber-ssh:/home/openchamber/.ssh
      - openchamber-workspaces:/home/openchamber/workspaces
    environment:
      - NODE_ENV=production
      - N9ROUTER_URL=http://9router:20128
      - OPENCHAMBER_HOST=0.0.0.0

  # ---------------------------------------------------------------------------
  # DeerFlow — ByteDance SuperAgent (deep research + coding agent)
  # Built from source so it works on ARM64 AND AMD64 servers.
  # Data persists via: deerflow-data, deerflow-config
  # ---------------------------------------------------------------------------
  deerflow:
    build:
      context: .
      dockerfile: deerflow.Dockerfile
      args:
        # Increment CACHE_BUST_DEERFLOW only if you want a completely fresh
        # DeerFlow build (e.g. after a major upstream update).
        CACHE_BUST_DEERFLOW: "1"
    container_name: deerflow
    restart: unless-stopped
    ports:
      - "2026:3000"
    volumes:
      - deerflow-data:/app/backend/.deer-flow
      - deerflow-config:/app/backend/config
    environment:
      - DEER_FLOW_HOME=/app/backend/.deer-flow
      - DEER_FLOW_CONFIG_PATH=/app/backend/config.yaml
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-changeme}
      - DEER_FLOW_INTERNAL_AUTH_TOKEN=${DEER_FLOW_INTERNAL_AUTH_TOKEN:-changeme}
      - NODE_ENV=production

  # ---------------------------------------------------------------------------
  # OmniRouter (OmniRoute) — Unified AI gateway (160+ providers, one endpoint)
  # platform: linux/amd64 enables QEMU emulation on ARM servers.
  # Config persists via: omnirouter-data
  # ---------------------------------------------------------------------------
  omnirouter:
    image: diegosouzapw/omniroute:latest
    pull_policy: always
    container_name: omnirouter
    restart: unless-stopped
    ports:
      - "8086:20128"
    volumes:
      - omnirouter-data:/app/data

# =============================================================================
# VOLUMES — all named so data survives every redeploy and update
# =============================================================================
volumes:
  9router-data:
  open-webui-data:
  openchamber-config:
  openchamber-share:
  openchamber-state:
  openchamber-opencode-config:
  openchamber-ssh:
  openchamber-workspaces:
  deerflow-data:
  deerflow-config:
  omnirouter-data:
