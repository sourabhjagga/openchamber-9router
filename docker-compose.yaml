version: '3.8'

# =============================================================================
# SERVICES
# All five services share one explicit Docker network (headroom-net) so
# inter-service communication uses Docker DNS (service name as hostname).
#
# Startup order:
#   neo4j + qdrant  →  headroom-proxy (waits healthy)  →  9router  →  openchamber
# =============================================================================

services:

  headroom-proxy:
    image: docker.io/sourabhjagga/headroom:latest
    pull_policy: always
    container_name: headroom-proxy
    restart: unless-stopped
    command: ["--host", "0.0.0.0"]
    networks:
      - headroom-net
    ports:
      - "8787:8787"
    environment:
      - HEADROOM_HOST=0.0.0.0
    volumes:
      - headroom-workspace:/home/nonroot/.headroom
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8787/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      qdrant:
        condition: service_started
      neo4j:
        condition: service_started

  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: qdrant
    restart: unless-stopped
    networks:
      - headroom-net
    expose:
      - "6333"
      - "6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  neo4j:
    image: neo4j:5.26
    container_name: neo4j
    restart: unless-stopped
    networks:
      - headroom-net
    expose:
      - "7474"
      - "7687"
    volumes:
      - neo4j-data:/data
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/devpassword}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true

  9router:
    image: sourabhjagga/9router:latest
    pull_policy: always
    container_name: 9router
    restart: unless-stopped
    networks:
      - headroom-net
    ports:
      - "8085:20128"
    volumes:
      - 9router-data:/app/data
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data
    depends_on:
      headroom-proxy:
        condition: service_healthy

  openchamber:
    image: sourabhjagga/openchamber:latest
    pull_policy: always
    container_name: openchamber
    restart: unless-stopped
    networks:
      - headroom-net
    ports:
      - "3051:3000"
    entrypoint:
      - sh
      - -c
      - |
        rm -f /home/openchamber/.config/openchamber/run/openchamber-*.pid
        exec sh /home/openchamber/openchamber-entrypoint.sh
    volumes:
      - openchamber-config:/home/openchamber/.config/openchamber
      - openchamber-share:/home/openchamber/.local/share/opencode
      - openchamber-state:/home/openchamber/.local/state/opencode
      - openchamber-opencode-config:/home/openchamber/.config/opencode
      - openchamber-ssh:/home/openchamber/.ssh
      - openchamber-workspaces:/home/openchamber/workspaces
    environment:
      - NODE_ENV=production
      - N9ROUTER_URL=http://9router:20128
      - OPENCHAMBER_HOST=0.0.0.0
      - OPENCHAMBER_UI_PASSWORD=${OPENCHAMBER_UI_PASSWORD}
    depends_on:
      - 9router


# =============================================================================
# NETWORKS
# =============================================================================
networks:
  headroom-net:
    driver: bridge


# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  headroom-workspace:
  qdrant-data:
  neo4j-data:
  9router-data:
  openchamber-config:
  openchamber-share:
  openchamber-state:
  openchamber-opencode-config:
  openchamber-ssh:
  openchamber-workspaces:
